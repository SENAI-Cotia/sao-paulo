<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login — EntreNós</title>
    <link rel="stylesheet" th:href="@{/Css/LoginPage.css}" />
</head>
<body>

<header>
    <a href="/" class="logo">ENTRE<span>NÓS</span></a>
</header>

<main>
    <div class="card-login">
        <h2>Bem-vindo!</h2>

        <div class="tipo-selector">
            <button type="button" class="tipo-btn ativo" id="btn-usuario" onclick="selecionarTipo('usuario')">🎓 Aluno</button>
            <button type="button" class="tipo-btn" id="btn-psicologo" onclick="selecionarTipo('psicologo')">🩺 Psicólogo</button>
        </div>

        <p th:if="${param.error}">
            E-mail ou senha inválidos.
        </p>

        <p th:if="${param.logout}">
            Você saiu com sucesso.
        </p>

        <form th:action="@{/login}" method="POST">

            <div class="grupo">
                <label for="username">E-mail</label>
                <input type="email" id="username" name="username" placeholder="seu@email.com" required autofocus />
            </div>

            <div class="grupo">
                <label for="password">Senha</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required />
            </div>

            <button class="btn-login" type="submit">Entrar</button>
        </form>

        <p class="link-cadastro">
            Não tem conta? <a href="/cadastro">Cadastre-se aqui</a>
        </p>
    </div>
</main>

<footer>
    <p>© 2026 ENTRENÓS — Todos os direitos reservados</p>
</footer>

<script th:src="@{/JS/LoginPage.js}"></script>

</body>
</html>
