<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login — EntreNós</title>
    <link rel="stylesheet" href="/Css/LoginPage.css" />
</head>
<body>

<header>
    <a href="/" class="logo">ENTRE<span>NÓS</span></a>
</header>

<main>
    <div class="card-login">
        <h2>Bem-vindo!</h2>

        <div class="tipo-selector">
            <button type="button" class="tipo-btn ativo" id="btn-usuario" onclick="selecionarTipo('usuario')">🎓 Aluno</button>
            <button type="button" class="tipo-btn" id="btn-psicologo" onclick="selecionarTipo('psicologo')">🩺 Psicólogo</button>
        </div>

        <p th:if="${param.error}"
           style="color: #e74c3c; font-size: 0.9rem; margin-bottom: 15px; text-align: center; font-weight: bold;">
            E-mail ou senha inválidos.
        </p>

        <p th:if="${param.logout}"
           style="color: #2ecc71; font-size: 0.9rem; margin-bottom: 15px; text-align: center;">
            Você saiu com sucesso.
        </p>

        <form th:action="@{/login}" method="POST">

            <div class="grupo">
                <label for="username">E-mail</label>
                <input type="email" id="username" name="username" placeholder="seu@email.com" required autofocus />
            </div>

            <div class="grupo">
                <label for="password">Senha</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required />
            </div>

            <button class="btn-login" type="submit">Entrar</button>
        </form>

        <p class="link-cadastro" style="text-align: center; margin-top: 20px;">
            Não tem conta? <a href="/cadastro" style="color: #4a90e2; text-decoration: none; font-weight: bold;">Cadastre-se aqui</a>
        </p>
    </div>
</main>

<footer>
    <p>© 2026 ENTRENÓS — Todos os direitos reservados</p>
</footer>

<script>
    function selecionarTipo(tipo) {
        document.getElementById('btn-usuario').classList.toggle('ativo', tipo === 'usuario');
        document.getElementById('btn-psicologo').classList.toggle('ativo', tipo === 'psicologo');
    }
</script>

</body>
</html>
