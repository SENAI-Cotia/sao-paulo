<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>EntreNos - Cadastro</title>
</head>
<body>

<div th:if="${mensagemErro}">
    <p th:text="${mensagemErro}"></p>
</div>

<div th:if="${mensagemEmail}">
    <p th:text="${mensagemEmail}"></p>
</div>

<h2>Cadastro de Aluno</h2>
<hr>

<form th:action="@{/salvar}" th:object="${aluno}" method="post">

    <label>Nome:</label><br>
    <input type="text" th:field="*{nome}" placeholder="Digite seu nome" required><br><br>

    <label>E-mail:</label><br>
    <input type="email" th:field="*{email}" placeholder="seu@email.com" required><br><br>

    <label>Senha:</label><br>
    <input type="password" th:field="*{senha}" placeholder="Crie uma senha" required><br><br>

    <button type="submit">Cadastrar Aluno</button>
</form>

<br>
<a href="/">Voltar para Home</a>

</body>
</html>
