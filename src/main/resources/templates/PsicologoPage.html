<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Painel do Profissional</title>
    <link rel="stylesheet" th:href="@{/Css/PsicologoPage.css}" />
</head>
<body>
<header>
    <a href="/" class="logo">EntreNós</a>
    <span class="badge-psicologa" th:text="${nomeUsuario != null ? nomeUsuario : 'Profissional'}">Psicólogo</span>
    <form th:action="@{/logout}" method="post" id="logout-form" class="oculto"></form>
    <a href="javascript:void(0)" class="btn-nav" onclick="document.getElementById('logout-form').submit();">Sair</a>
</header>
<main>
    <div class="painel">
        <h2>Lista de Usuários</h2>
        <div th:each="u : ${usuarios}"
             class="agendamento-item"
             th:attr="onclick=|mostrarDados(this, '${u.nome}', '${u.email}', '${u.role}')|">
            <div class="usuario-info">
                <span class="usuario-nome" th:text="${u.nome}">Nome do Aluno</span>
                <span class="usuario-hora" th:text="${u.role}">ROLE</span>
            </div>
            <button class="btn-detalhes">Ver Detalhes</button>
        </div>
        <div th:if="${#lists.isEmpty(usuarios)}">
            <p>Nenhum usuário cadastrado.</p>
        </div>
    </div>
    <div class="painel-dados">
        <h2>Dados Selecionados</h2>
        <div id="dados-conteudo" class="dados-vazio">
            <span>Selecione um usuário na lista ao lado</span>
        </div>
    </div>
</main>
<footer>
    <p>Rodapé — &copy; 2026 ENTRENÓS</p>
</footer>
<script th:src="@{/JS/PsicologoPage.js}"></script>
</body>
</html>
